<html lang="en">

<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayankDevil</title>

    <link rel="stylesheet" href="../src/css/code_finder.css">

<body>
    <!-- ( main ) -->
    <div class="container" id="main">
        <div class="row">
       
            <div class="col">

                <input type="text" name="user_code" id="input_field" placeholder="REMEMBER NUMBER" />
                
            </div>

            <div class="col" id="key_container">

                <button class="btn" id="start_btn"> PLAY </button>

                <select name="level" id="select_level">
                    <option value="0"> EASY </option>
                    <option value="1"> MEDIUM </option>
                    <option value="2"> HARDER </option>
                </select>

            </div>

        </div>
    </div>
