<!DOCTYPE html>
<!--

- File : key_press.html

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayankDevil</title>
    
    <!-- ( style ) -->
    <link rel="stylesheet" href="../src/css/key_press.css">
    
    <!-- ( script ) -->
    <script src="../src/js/key_press.js"></script>

</head>

<body>

    <main class="" id="root">
        <div class="container" id="keyboard">
            <div class="row">
                <span class="btn key" data-key="`">`</span>
                <span class="btn key" data-key="1">1</span>
                <span class="btn key" data-key="2">2</span>
                <span class="btn key" data-key="3">3</span>
                <span class="btn key" data-key="4">4</span>
                <span class="btn key" data-key="5">5</span>
                <span class="btn key" data-key="6">6</span>
                <span class="btn key" data-key="7">7</span>
                <span class="btn key" data-key="8">8</span>
                <span class="btn key" data-key="9">9</span>
                <span class="btn key" data-key="0">0</span>
                <span class="btn key" data-key="-">-</span>
                <span class="btn key" data-key="=">=</span>
                <span class="btn key" data-key="BACKSPACE">DEL</span>
            </div>
            <div class="row">
                <span class="btn key utility" data-key="TAB">Tab</span>
                <span class="btn key" data-key="Q">Q</span>
                <span class="btn key" data-key="W">W</span>
                <span class="btn key" data-key="E">E</span>
                <span class="btn key" data-key="R">R</span>
                <span class="btn key" data-key="T">T</span>
                <span class="btn key" data-key="Y">Y</span>
                <span class="btn key" data-key="U">U</span>
                <span class="btn key" data-key="I">I</span>
                <span class="btn key" data-key="O">O</span>
                <span class="btn key" data-key="P">P</span>
                <span class="btn key" data-key="[">[</span>
                <span class="btn key" data-key="]">]</span>
                <span class="btn key" data-key="\">\</span>
            </div>
            <div class="row">
                <span class="btn key utility" data-key="CAPSLOCK">CAPS</span>
                <span class="btn key" data-key="A">A</span>
                <span class="btn key" data-key="S">S</span>
                <span class="btn key" data-key="D">D</span>
                <span class="btn key" data-key="F">F</span>
                <span class="btn key" data-key="G">G</span>
                <span class="btn key" data-key="H">H</span>
                <span class="btn key" data-key="J">J</span>
                <span class="btn key" data-key="K">K</span>
                <span class="btn key" data-key="L">L</span>
                <span class="btn key" data-key=";">;</span>
                <span class="btn key" data-key="'">'</span>
                <span class="btn key utility" data-key="ENTER">ENTER</span>
            </div>
            <div class="row">
                <span class="btn key utility" data-key="SHIFT">SHIFT</span>
                <span class="btn key" data-key="Z">Z</span>
                <span class="btn key" data-key="X">X</span>
                <span class="btn key" data-key="C">C</span>
                <span class="btn key" data-key="V">V</span>
                <span class="btn key" data-key="B">B</span>
                <span class="btn key" data-key="N">N</span>
                <span class="btn key" data-key="M">M</span>
                <span class="btn key" data-key=",">,</span>
                <span class="btn key" data-key=".">.</span>
                <span class="btn key" data-key="/">/</span>
                <span class="btn key utility" data-key="SHIFT">SHIFT</span>
            </div>
        </div>
    </main>

</body>

</html>
