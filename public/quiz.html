<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- ( style ) -->
    <link rel="stylesheet" href="../src/css/quiz.css">
    
    <!-- ( script ) -->
    <script src="../src/js/quiz.js"></script>

</head>

<body>
    <!-- ( main ) -->
	<main id="main">
        <!-- ( header section ) -->
		<header class="" id=""></header>
		<!-- ( section ) -->
		<section id="root">
		    <div class="container">

                <!-- { question container } -->
                <div class="" id="question_container">

                    <div class="lead" id="question_field"> question </div>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="quiz_option" value="0" id="r1a1">
                        <label class="form-check-label" for="r1a1" id="option0">A</label>
                    </div>
                    
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="quiz_option" value="1" id="r1a2">
                        <label class="form-check-label" for="r1a2"  id="option1">B</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="quiz_option" value="2" id="r1a3">
                        <label class="form-check-label" for="r1a3" id="option2">C</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="quiz_option" value="3" id="r1a4">
                        <label class="form-check-label" for="r1a4" id="option3">D</label>
                    </div>
                    
                </div>
                
                <!-- ( submit set ) -->
                <div class="flex" id="contorl_container">
                    
                    <div class="flex">
                        <div class="lead" id="count_time"> 01:00 </div>                    
                        <div class="h5 text-primary" id="user_rank"> </div>
                    </div>
                    
                    <!-- (button) -->
                    <div class="text-end">
                        <input type="submit" value="Submit Answer" class="btn" id="submit_btn">
                    </div>
                    
                </div>
            
            </div>
		</section>
        <!-- ( footer section ) -->
		<footer class="d-none" id="footer"></footer>

	</main>

</body>

</html>
